<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #0f3460, #16213e, #1a1a2e);
    overflow-x: hidden;
    padding: 20px;
}

/* Background Glowing Circles */
body::before, body::after {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
}

body::before {
    background: rgba(0, 191, 255, 0.4);
    top: -100px;
    left: -100px;
}

body::after {
    background: rgba(0, 255, 153, 0.3);
    bottom: -100px;
    right: -100px;
}

/* Premium Card Design */
.card {
    position: relative;
    width: 100%;
    max-width: 400px;
    padding: 40px 30px;
    text-align: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

/* Profile Image */
.card img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid #00bfff;
    object-fit: cover;
    margin-bottom: 25px;

    padding: 16px;
    border-radius: 50px;

.btn-telegram:hover {
